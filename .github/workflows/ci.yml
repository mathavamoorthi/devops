name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: docker compose build

      - name: Start the stack
        run: docker compose up -d

      - name: Wait for control-plane /health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/health > /dev/null; then
              echo "control-plane is healthy"
              exit 0
            fi
            echo "waiting... ($i)"
            sleep 2
          done
          echo "control-plane never became healthy"
          docker compose logs
          exit 1

      - name: Smoke test — create a project
        run: |
          curl -fsS -X POST http://localhost:3000/projects \
            -H 'Content-Type: application/json' \
            -d '{"name":"ci-smoke","repo_url":"https://github.com/octocat/Spoon-Knife","subdomain":"smoke"}'

      - name: Smoke test — list projects
        run: |
          curl -fsS http://localhost:3000/projects | grep -q '"name":"ci-smoke"'

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
