networks:
  vc-net:
    name: vc-net

services:
  control-plane:
    build: ./control-plane
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://app:app@postgres:5432/platform
    volumes:
      - ./control-plane/src:/app/src
      - ./control-plane/migrations:/app/migrations
      - ./control-plane/public:/app/public
    command: node --watch src/index.js
    restart: unless-stopped
    networks:
      - vc-net
    depends_on:
      postgres:
        condition: service_healthy

  builder:
    build: ./builder
    environment:
      DATABASE_URL: postgres://app:app@postgres:5432/platform
      DOCKER_NETWORK: vc-net
    volumes:
      - ./builder/src:/app/src
      - workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    command: node --watch src/index.js
    restart: unless-stopped
    networks:
      - vc-net
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    networks:
      - vc-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - vc-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d platform"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  postgres-data:
  workspace:
  caddy-data:
  caddy-config:
